<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sales call insights compliance illustration</title>
  <desc id="desc">A call center operator using AI with a certified compliant sign that confirms internal policy compliance.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF3F0"/>
      <stop offset="1" stop-color="#F7FBFA"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <rect x="70" y="80" width="1060" height="640" rx="28" fill="#FFFFFF" stroke="#D9E5E1" stroke-width="2" filter="url(#shadow)"/>

  <rect x="120" y="145" width="510" height="510" rx="20" fill="#F4F8F7" stroke="#DDE7E4"/>

  <circle cx="300" cy="300" r="78" fill="#C9D8D3"/>
  <rect x="225" y="388" width="150" height="165" rx="32" fill="#B7CAC4"/>

  <path d="M228 293C228 252 260 220 300 220C340 220 372 252 372 293" stroke="#5C746D" stroke-width="16" stroke-linecap="round"/>
  <rect x="214" y="297" width="28" height="68" rx="12" fill="#5C746D"/>
  <rect x="358" y="297" width="28" height="68" rx="12" fill="#5C746D"/>
  <rect x="272" y="328" width="56" height="14" rx="7" fill="#6B8A82"/>

  <rect x="420" y="220" width="180" height="145" rx="14" fill="#FFFFFF" stroke="#D9E5E1"/>
