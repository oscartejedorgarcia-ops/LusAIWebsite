  <rect x="440" y="270" width="130" height="10" rx="5" fill="#9FC1B7"/>
  <rect x="440" y="288" width="145" height="10" rx="5" fill="#9FC1B7"/>
  <rect x="440" y="306" width="110" height="10" rx="5" fill="#9FC1B7"/>

  <rect x="420" y="390" width="180" height="190" rx="14" fill="#FFFFFF" stroke="#D9E5E1"/>
  <text x="438" y="426" fill="#2F4E46" font-size="16" font-family="Arial, sans-serif" font-weight="700">Call Summary</text>
  <rect x="438" y="444" width="142" height="9" rx="4" fill="#BFD5CE"/>
  <rect x="438" y="460" width="150" height="9" rx="4" fill="#BFD5CE"/>
  <rect x="438" y="476" width="124" height="9" rx="4" fill="#BFD5CE"/>
  <rect x="438" y="500" width="28" height="28" rx="6" fill="#DDF1EA"/>
  <path d="M446 514L454 522L468 507" stroke="#3D7A68" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="476" y="518" fill="#3D7A68" font-size="13" font-family="Arial, sans-serif">Policy checks passed</text>

  <rect x="680" y="145" width="400" height="510" rx="20" fill="#EEF5F2" stroke="#D7E4E0"/>
  <text x="720" y="210" fill="#2E5249" font-size="34" font-family="Arial, sans-serif" font-weight="700">CERTIFIED</text>
  <text x="720" y="246" fill="#3B6A5F" font-size="24" font-family="Arial, sans-serif" font-weight="700">Compliant with Internal Policies</text>

  <circle cx="880" cy="385" r="122" fill="#E1F0EB" stroke="#9EC6B8" stroke-width="4"/>
  <circle cx="880" cy="385" r="96" fill="#FFFFFF" stroke="#9EC6B8" stroke-width="3"/>
  <path d="M830 386L865 421L936 349" stroke="#2F7D67" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

