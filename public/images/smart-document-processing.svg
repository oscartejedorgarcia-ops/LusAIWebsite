<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Smart document processing illustration</title>
  <desc id="desc">A scanned document on the left with highlighted text and image, arrows pointing to extracted JSON on the right.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF5FA"/>
      <stop offset="1" stop-color="#F8FBFD"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1400" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3B82F6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <rect x="70" y="80" width="500" height="640" rx="18" fill="#FFFFFF" stroke="#D1DCE8" stroke-width="2" filter="url(#shadow)"/>
  <text x="95" y="125" fill="#334155" font-size="22" font-family="Arial, sans-serif" font-weight="700">Scanned Document</text>

  <rect x="95" y="150" width="450" height="2" fill="#E2E8F0"/>

  <rect x="95" y="180" width="440" height="190" rx="12" fill="#F8FAFC" stroke="#D7E3EF"/>
  <rect x="108" y="208" width="414" height="34" rx="8" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="122" y="231" fill="#1E3A8A" font-size="18" font-family="Arial, sans-serif">Invoice #A-2045 | Date: 2026-03-04 | Total: EUR 12,540</text>

  <rect x="108" y="252" width="300" height="10" rx="4" fill="#CBD5E1"/>
  <rect x="108" y="270" width="390" height="10" rx="4" fill="#CBD5E1"/>
  <rect x="108" y="288" width="350" height="10" rx="4" fill="#CBD5E1"/>
  <rect x="108" y="306" width="410" height="10" rx="4" fill="#CBD5E1"/>

  <rect x="95" y="400" width="440" height="280" rx="12" fill="#F8FAFC" stroke="#D7E3EF"/>
  <rect x="110" y="420" width="410" height="235" rx="12" fill="#ECFDF3" stroke="#22C55E" stroke-width="2"/>
  <circle cx="205" cy="525" r="72" fill="#DCFCE7"/>
  <path d="M205 525 L205 453 A72 72 0 0 1 268 560 Z" fill="#16A34A"/>
  <path d="M205 525 L268 560 A72 72 0 0 1 156 579 Z" fill="#22C55E"/>
  <path d="M205 525 L156 579 A72 72 0 0 1 205 453 Z" fill="#86EFAC"/>
  <circle cx="205" cy="525" r="32" fill="#ECFDF3"/>
  <rect x="300" y="468" width="190" height="16" rx="6" fill="#86EFAC"/>
  <rect x="300" y="496" width="170" height="16" rx="6" fill="#4ADE80"/>
  <rect x="300" y="524" width="145" height="16" rx="6" fill="#22C55E"/>
  <rect x="130" y="580" width="372" height="55" rx="10" fill="#DCFCE7"/>
  <text x="144" y="613" fill="#166534" font-size="16" font-family="Arial, sans-serif">Embedded chart highlighted for extraction</text>

  <rect x="640" y="80" width="490" height="640" rx="18" fill="#0F172A" filter="url(#shadow)"/>
  <text x="670" y="124" fill="#E2E8F0" font-size="22" font-family="Courier New, monospace" font-weight="700">Extracted JSON</text>

  <rect x="670" y="150" width="430" height="2" fill="#1E293B"/>

  <g font-family="Courier New, monospace" font-size="18" fill="#E2E8F0">
    <text x="675" y="194">{</text>
    <text x="700" y="230">"document_type": "invoice",</text>
    <text x="700" y="266">"text_extraction": {</text>
    <text x="728" y="300" fill="#93C5FD">"invoice_id": "A-2045",</text>
    <text x="728" y="334" fill="#93C5FD">"date": "2026-03-04",</text>
    <text x="728" y="368" fill="#93C5FD">"total": 12540</text>
    <text x="700" y="402">},</text>
    <text x="700" y="438">"image_analysis": {</text>
    <text x="728" y="472" fill="#86EFAC">"description": "Product photo with label",</text>
    <text x="728" y="506" fill="#86EFAC">"product_code": "PX-77",</text>
    <text x="728" y="540" fill="#86EFAC">"quantity": 24</text>
    <text x="700" y="574">},</text>
    <text x="700" y="610">"status": "validated"</text>
    <text x="675" y="646">}</text>
  </g>

  <path d="M 530 226 C 600 226, 620 260, 675 300" stroke="#3B82F6" stroke-width="4" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 520 520 C 585 520, 620 500, 675 472" stroke="#16A34A" stroke-width="4" fill="none" marker-end="url(#arrowGreen)"/>
</svg>
